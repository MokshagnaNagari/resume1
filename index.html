 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mokshagna | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f0f0f;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Canvas Background */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Container */
.container {
    max-width: 420px;
    margin: auto;
    padding: 25px;
}

/* Profile */
.profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid cyan;
    box-shadow: 0 0 20px cyan;
}

.profile h2 {
    margin-top: 12px;
}

/* Typing text */
.typing {
    color: #00f7ff;
    font-size: 14px;
    margin-top: 5px;
}

/* Buttons */
.link-btn {
    display: block;
    margin: 12px 0;
    padding: 15px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.link-btn:hover {
    transform: scale(1.05);
    border: 1px solid cyan;
}

/* Skills */
.skills {
    margin-top: 25px;
    text-align: left;
}

.skill {
    margin: 10px 0;
}

.bar {
    height: 8px;
    background: #333;
    border-radius: 10px;
}

.progress {
    height: 8px;
    background: cyan;
    border-radius: 10px;
}

/* Footer */
.footer {
    margin-top: 25px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <div class="profile">
        <img src="https://via.placeholder.com/120">
        <h2>Mokshagna</h2>
        <div class="typing" id="typing"></div>
    </div>

    <div class="section">
        <a class="link-btn" href="Mokshagna_Resume.pdf" target="_blank">📄 Resume</a>
        <a class="link-btn" href="https://github.com/coderbalu" target="_blank">💻 GitHub</a>
        <a class="link-btn" href="https://www.linkedin.com/in/nagari-mokshagna-9899b62b3/" target="_blank">🔗 LinkedIn</a>
        <a class="link-btn" href="https://leetcode.com/u/mokshagnanagari01/" target="_blank">🧠 LeetCode</a>
        <a class="link-btn" href="https://www.geeksforgeeks.org/profile/mokshagnanagari" target="_blank">📘 GeeksforGeeks</a>
        <a class="link-btn" href="https://github.com/coderbalu?tab=repositories" target="_blank">🚀 Projects</a>
    </div>

    <!-- Skills -->
    <div class="skills">
        <h3>Skills</h3>

        <div class="skill">
            C
            <div class="bar"><div class="progress" style="width: 80%"></div></div>
        </div>

        <div class="skill">
            Java
            <div class="bar"><div class="progress" style="width: 75%"></div></div>
        </div>

        <div class="skill">
            Python
            <div class="bar"><div class="progress" style="width: 85%"></div></div>
        </div>

        <div class="skill">
            DSA
            <div class="bar"><div class="progress" style="width: 70%"></div></div>
        </div>

        <div class="skill">
            Full Stack
            <div class="bar"><div class="progress" style="width: 65%"></div></div>
        </div>

    </div>

    <div class="footer">
        © 2026 Mokshagna
    </div>

</div>

<script>
// Typing animation
const text = ["Full Stack Developer", "DSA Learner", "Problem Solver"];
let i = 0, j = 0, current = "", isDeleting = false;

function type() {
    current = text[i];
    document.getElementById("typing").textContent = current.substring(0, j);

    if (!isDeleting && j < current.length) j++;
    else if (isDeleting && j > 0) j--;
    else {
        isDeleting = !isDeleting;
        if (!isDeleting) i = (i + 1) % text.length;
    }

    setTimeout(type, isDeleting ? 50 : 100);
}
type();

// Particle animation
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "cyan";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
